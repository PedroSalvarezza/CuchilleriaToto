<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./recursos/imagenes/LogoFinal.png" type="image/png">
  <title>Admin | Cuchillería Toto</title>
  <link rel="stylesheet" href="./recursos/css/admin.css">
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────────────────────── -->
  <div id="pantalla-login">
    <div class="login-card">
      <div class="login-logo">
        <img src="./recursos/imagenes/LogoFinal.png" alt="Logo">
      </div>
      <h1>Panel de Administrador</h1>
      <p>Cuchillería Toto</p>

      <form id="form-login" novalidate>
        <div class="login-campo">
          <label for="inp-usuario">Usuario</label>
          <input type="text" id="inp-usuario" autocomplete="username" required>
        </div>
        <div class="login-campo">
          <label for="inp-clave">Contraseña</label>
          <input type="password" id="inp-clave" autocomplete="current-password" required>
        </div>
        <p class="login-error" id="login-error"></p>
        <button type="submit" class="btn-login" id="btn-login">Ingresar</button>
      </form>
    </div>
  </div>

  <!-- ── PANEL PRINCIPAL ───────────────────────────────────────────────── -->
  <div id="panel-admin">

    <header class="admin-header">
      <div>
        <span class="admin-header-titulo">Cuchillería Toto</span>
        <span class="admin-header-sub">Panel de Administración</span>
      </div>
      <button class="btn-cerrar-sesion" id="btn-cerrar-sesion">Cerrar sesión</button>
    </header>

    <div class="admin-contenido">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn activo" data-tab="catalogo">Catálogo</button>
        <button class="tab-btn" data-tab="galeria">Galería</button>
      </div>

      <!-- ── TAB: CATÁLOGO ─────────────────────────────────────────────── -->
      <div class="tab-panel activo" id="tab-catalogo">

        <div class="seccion-titulo">
          <span>Productos del catálogo</span>
          <button class="btn btn-primario" id="btn-nuevo-catalogo">+ Agregar producto</button>
        </div>

        <div id="lista-catalogo">
          <p class="estado-cargando">Cargando productos…</p>
        </div>

        <!-- Formulario catálogo -->
        <div class="admin-form-wrap" id="form-catalogo-wrap" style="display:none;">
          <p class="admin-form-titulo" id="form-catalogo-titulo">Nuevo producto</p>
          <form id="form-catalogo" novalidate>
            <input type="hidden" id="cat-id">
            <div class="form-grid">
              <div class="campo">
                <label for="cat-nombre">Nombre *</label>
                <input type="text" id="cat-nombre" placeholder="Ej: Cuchillo N°22" required>
              </div>
              <div class="campo">
                <label for="cat-precio">Precio (ARS) *</label>
                <input type="number" id="cat-precio" placeholder="Ej: 45000" min="0" required>
              </div>
              <div class="campo">
                <label for="cat-medidas">Medidas *</label>
                <input type="text" id="cat-medidas" placeholder="Ej: 13 cm">
              </div>
              <div class="campo">
                <label for="cat-material">Material *</label>
                <input type="text" id="cat-material" placeholder="Ej: Acero inoxidable">
              </div>
              <div class="campo">
                <label for="cat-cabo">Cabo (mango) *</label>
                <input type="text" id="cat-cabo" placeholder="Ej: Madera oscura">
              </div>
              <div class="campo campo-ancho">
                <label for="cat-imagen">URL de imagen *</label>
                <input type="url" id="cat-imagen" placeholder="https://...">
                <img class="img-preview" id="cat-preview" alt="Vista previa">
              </div>
            </div>
            <div class="form-acciones">
              <button type="submit" class="btn btn-primario">Guardar</button>
              <button type="button" class="btn btn-cancelar" id="btn-cancelar-catalogo">Cancelar</button>
            </div>
          </form>
        </div>

      </div>

      <!-- ── TAB: GALERÍA ──────────────────────────────────────────────── -->
      <div class="tab-panel" id="tab-galeria">

        <div class="seccion-titulo">
          <span>Fotos de la galería</span>
          <button class="btn btn-primario" id="btn-nuevo-galeria">+ Agregar foto</button>
        </div>

        <div id="lista-galeria">
          <p class="estado-cargando">Cargando galería…</p>
        </div>

        <!-- Formulario galería -->
        <div class="admin-form-wrap" id="form-galeria-wrap" style="display:none;">
          <p class="admin-form-titulo" id="form-galeria-titulo">Nueva foto</p>
          <form id="form-galeria" novalidate>
            <input type="hidden" id="gal-id">
            <div class="form-grid">
              <div class="campo">
                <label for="gal-nombre">Nombre *</label>
                <input type="text" id="gal-nombre" placeholder="Ej: Cuchillo N°28">
              </div>
              <div class="campo campo-ancho">
                <label for="gal-imagen">URL de imagen *</label>
                <input type="url" id="gal-imagen" placeholder="https://...">
                <img class="img-preview" id="gal-preview" alt="Vista previa">
              </div>
            </div>
            <div class="form-acciones">
              <button type="submit" class="btn btn-primario">Guardar</button>
              <button type="button" class="btn btn-cancelar" id="btn-cancelar-galeria">Cancelar</button>
            </div>
          </form>
        </div>

      </div>

    </div><!-- /admin-contenido -->
  </div><!-- /panel-admin -->

  <script src="./recursos/js/admin.js"></script>
</body>
</html>
